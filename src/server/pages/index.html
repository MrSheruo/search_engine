<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body>
    <div class="flex items-center justify-center h-screen">
        <div class="flex flex-col items-center justify-center">
            <h1 class="text-4xl font-bold">Search Engine</h1>
            <form action="/api/search" method="get" class="flex items-center gap-2">
                <input id="searchInput" type="text" name="q" placeholder="Search"
                    class="border border-gray-300 rounded-md p-2">
                <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-md">Search</button>
            </form>
            <div id="results" class="flex flex-col gap-2 mt-4">

            </div>
        </div>
    </div>
</body>

</html>
